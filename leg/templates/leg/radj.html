{% extends "leg/base.html" %}
{% block content %}

<h4>J</h4>

{% if tysj %}
    <img src="{{ tysj.image.url }}" alt="Billede" style="max-width: 300px;"><br>
{% endif %}

<form method="post">
    {% csrf_token %}
    <label for="gæt-tysj">Hvad forestiller billedet?</label>
    <input type="text" name="gæt" id="gæt-tysj">
    <input type="hidden" name="alfabet_id" value="{{ tysj.id }}">
    <button type="submit">Tjek</button>
</form>

{% if resultat %}
    <p><strong>{{ resultat }}</strong></p>
{% endif %}

<hr>

<a class="btn btn-success" href="{% url "rad" %}">Tilbage</a>
<a class="btn btn-success" href="{% url "radk" %}">Næste</a>


{% endblock content %}
