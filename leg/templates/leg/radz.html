{% extends "leg/base.html" %}
{% block content %}

<h4>Z</h4>

{% if tysz %}
    <img src="{{ tysz.image.url }}" alt="Billede" style="max-width: 300px;"><br>
{% endif %}

<form method="post">
    {% csrf_token %}
    <label for="gæt-tysz">Hvad forestiller billedet?</label>
    <input type="text" name="gæt" id="gæt-tysz">
    <input type="hidden" name="alfabet_id" value="{{ tysz.id }}">
    <button type="submit">Tjek</button>
</form>

{% if resultat %}
    <p><strong>{{ resultat }}</strong></p>
{% endif %}

<hr>

<a class="btn btn-success" href="{% url "rad" %}">Tilbage</a>



{% endblock content %}
