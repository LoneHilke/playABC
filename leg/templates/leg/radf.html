{% extends "leg/base.html" %}
{% block content %}

<h4>F</h4>

{% if tysf %}
    <img src="{{ tysf.image.url }}" alt="Billede" style="max-width: 300px;"><br>
{% endif %}

<form method="post">
    {% csrf_token %}
    <label for="gæt-tysf">Hvad forestiller billedet?</label>
    <input type="text" name="gæt" id="gæt-tysf">
    <input type="hidden" name="alfabet_id" value="{{ tysf.id }}">
    <button type="submit">Tjek</button>
</form>

{% if resultat %}
    <p><strong>{{ resultat }}</strong></p>
{% endif %}

<hr>

<a class="btn btn-success" href="{% url "rad" %}">Tilbage</a>
<a class="btn btn-success" href="{% url "radg" %}">Næste</a>


{% endblock content %}
