{% extends "leg/base.html" %}
{% block content %}

<h4>Q</h4>

{% if tysq %}
    <img src="{{ tysq.image.url }}" alt="Billede" style="max-width: 300px;"><br>
{% endif %}

<form method="post">
    {% csrf_token %}
    <label for="gæt-tysq">Hvad forestiller billedet?</label>
    <input type="text" name="gæt" id="gæt-tysq">
    <input type="hidden" name="alfabet_id" value="{{ tysq.id }}">
    <button type="submit">Tjek</button>
</form>

{% if resultat %}
    <p><strong>{{ resultat }}</strong></p>
{% endif %}

<hr>

<a class="btn btn-success" href="{% url "rad" %}">Tilbage</a>
<a class="btn btn-success" href="{% url "radr" %}">Næste</a>


{% endblock content %}
